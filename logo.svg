<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" role="img" aria-labelledby="title desc">
  <title id="title">QQYY</title>
  <desc id="desc">A Matrix-inspired QQYY wordmark with glowing green terminal lettering.</desc>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001607"/>
      <stop offset="1" stop-color="#030604"/>
    </linearGradient>
  </defs>
  <rect x="10" y="18" width="500" height="144" rx="12" fill="url(#panel)" stroke="#00ff6a" stroke-width="3"/>
  <path d="M34 48h452M34 132h452" stroke="#00ff6a" stroke-width="2" opacity="0.38"/>
  <g fill="#00ff6a" opacity="0.5" font-family="Courier New, monospace" font-size="16">
    <text x="38" y="75">0101</text>
    <text x="434" y="75">VEIL</text>
    <text x="38" y="115">QQYY</text>
    <text x="408" y="115">1010</text>
  </g>
  <text x="260" y="106" text-anchor="middle" font-family="Courier New, monospace" font-size="72" font-weight="700" fill="#d9ffe5" stroke="#00ff6a" stroke-width="1.4" filter="url(#glow)">QQYY</text>
  <text x="260" y="139" text-anchor="middle" font-family="Courier New, monospace" font-size="19" font-weight="700" fill="#59f6ff">qqyy.org</text>
</svg>
